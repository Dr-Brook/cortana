# CORTANA — Voice-First AI Assistant for macOS
# Built from CLAUDE.md by RJ - https://itsbrook.com

version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8444:8444"
    environment:
      - OLLAMA_BASE=http://host.docker.internal:11434
      - VOICEBOX_URL=http://host.docker.internal:17493
      - PB_BASE=http://host.docker.internal:8090
      - OLLAMA_MODEL=glm-5.1:cloud
    volumes:
      - ./:/app
    restart: unless-stopped
    network_mode: bridge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - VITE_WS_URL=ws://host.docker.internal:8444/ws
    depends_on:
      - backend
    restart: unless-stopped